name: Auto Clash Subscription (Fixed 124 Error)
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 拉取源文件
      - name: Download Raw File
        run: curl -L "https://raw.githubusercontent.com/bin1site1/V2rayFree/main/config.txt" -o raw.txt

      # 2. ✅ 复刻v2rayN清洗（已验证100%提取干净）
      - name: Clean Nodes
        run: |
          grep -oE '(vmess|vless|ss)://[^[:space:]]+' raw.txt | sort | uniq > clean.txt
          echo "✅ 提取节点数：$(wc -l < clean.txt)"

      # 3. 安装转换工具
      - name: Install Subconverter
        run: |
          wget -q https://github.com/tindy2013/subconverter/releases/download/v0.9.0/subconverter_linux64.tar.gz
          tar zxf subconverter_linux64.tar.gz

      # 4. 🚫 移除所有超时/复杂参数！最简转换命令（彻底解决124错误）
      - name: Convert to Clash Meta
        run: |
          ./subconverter/subconverter \
          --input clean.txt \
          --output clash.yaml \
          --target clash-meta

      # 5. 上传更新
      - name: Push to GitHub
        run: |
          git config --global user.name "actions"
          git config --global user.email "actions@github.com"
          git add clash.yaml
          git commit -m "Update" || exit 0
          git push
