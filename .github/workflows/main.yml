name: 自动转换Clash订阅（修复卡死版）
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 3  # 强制3分钟超时，彻底杜绝卡死
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 拉取最新节点
        run: curl -L "https://raw.githubusercontent.com/bin1site1/V2rayFree/main/config.txt" -o nodes.txt

      - name: 下载转换工具
        run: |
          wget -q https://github.com/tindy2013/subconverter/releases/download/v0.7.2/subconverter_linux64.tar.gz
          tar zxf subconverter_linux64.tar.gz

      - name: 转换为Clash Meta配置（核心修复卡死）
        run: |
          ./subconverter/subconverter --once \
          --input "nodes.txt" \
          --output "clash.yaml" \
          --meta true \
          --dedup true

      - name: 上传更新
        run: |
          git config --global user.name "actions"
          git config --global user.email "actions@github.com"
          git add clash.yaml
          git commit -m "更新订阅 $(date)" || exit 0
          git push
