name: Auto Clash Subscription (Working)
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download & Clean Nodes
        run: |
          curl -sL "https://raw.githubusercontent.com/bin1site/V2rayFree/main/config.txt" -o raw.txt
          grep -oE '(vmess|vless|ss|trojan)://[^[:space:]]+' raw.txt | sort -u > clean.txt
          echo "✅ 提取节点数: $(wc -l < clean.txt)"
          if [ ! -s clean.txt ]; then
            echo "❌ 无有效节点"
            exit 1
          fi

      - name: Setup Subconverter
        run: |
          wget -q https://github.com/MetaCubeX/subconverter/releases/download/v0.9.2/subconverter_linux64.tar.gz 
          tar zxf subconverter_linux64.tar.gz
          chmod +x subconverter/subconverter

      - name: Convert to Clash
        run: |
          NODES_B64=$(base64 -w0 clean.txt)
          DATA_URI="data:text/plain;base64,${NODES_B64}"
          
          cat > subconverter/generate.ini << EOF
          [clash]
          path=clash.yaml
          target=clash
          url=${DATA_URI}
          EOF
          
          cd subconverter
          ./subconverter -g --artifact "clash"
          mv clash.yaml ../
          cd ..
          
          if [ ! -f clash.yaml ] || ! grep -q "proxies:" clash.yaml; then
            echo "❌ 转换失败"
            exit 1
          fi
          echo "✅ 转换成功，proxies 数量: $(grep -c 'name:' clash.yaml || echo '0')"

      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clash.yaml
          git commit -m "Update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push https://${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
