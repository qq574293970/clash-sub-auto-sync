name: Auto Clash Subscription
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download & Clean Nodes
        run: |
          curl -sL "https://raw.githubusercontent.com/bin1site1/V2rayFree/main/config.txt" -o raw.txt
          grep -oE '(vmess|vless|ss|trojan)://[^[:space:]]+' raw.txt | sort -u > clean.txt
          echo "✅ 提取节点数: $(wc -l < clean.txt)"

      - name: Setup Subconverter
        run: |
          wget -q https://github.com/tindy2013/subconverter/releases/download/v0.9.0/subconverter_linux64.tar.gz
          tar zxf subconverter_linux64.tar.gz
          chmod +x subconverter/subconverter

      - name: Convert to Clash
        run: |
          ./subconverter/subconverter > /dev/null 2>&1 &
          sleep 3
          curl -fsSL "http://127.0.0.1:25500/sub?target=clash&url=clean.txt&insert=false" -o clash.yaml
          if ! grep -q "proxies:" clash.yaml; then
            echo "❌ 转换失败"
            exit 1
          fi
          echo "✅ 转换成功"

      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clash.yaml
          git commit -m "Update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push https://${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
