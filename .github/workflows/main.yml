name: 自动转换Clash订阅（零卡死版）
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 拉取最新节点
        run: curl -L "https://raw.githubusercontent.com/bin1site1/V2rayFree/main/config.txt" -o nodes.txt

      - name: 安装 Python 转换工具（关键！）
        run: pip install py-subconverter

      - name: 转换为 Clash Meta 配置
        run: |
          # 直接用 Python 工具转换，零服务，零卡死
          echo "Converting nodes..."
          py-sub-conv --input nodes.txt --output clash.yaml --meta

      - name: 上传更新
        run: |
          git config --global user.name "actions"
          git config --global user.email "actions@github.com"
          git add clash.yaml
          git commit -m "更新订阅 $(date)" || exit 0
          git push
