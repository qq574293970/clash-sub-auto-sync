name: Auto Clash Subscription (No 255 Error - Final)
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download & Clean Nodes (v2rayN Logic)
        run: |
          curl -sL "https://raw.githubusercontent.com/bin1site1/V2rayFree/main/config.txt" -o raw.txt
          grep -oE '(vmess|vless|ss|trojan)://[^[:space:]]+' raw.txt | sort -u > clean.txt
          echo "✅ 提取节点数: $(wc -l < clean.txt)"
          # 空节点保护
          if [ ! -s clean.txt ]; then
            echo "❌ 无有效节点"
            exit 1
          fi

      - name: Setup Subconverter (MetaCubeX Latest)
        run: |
          wget -q https://github.com/MetaCubeX/subconverter/releases/download/v0.9.2/subconverter_linux64.tar.gz
          tar zxf subconverter_linux64.tar.gz
          chmod +x subconverter/subconverter

      - name: Convert to Clash (File Protocol + Generate Mode)
        run: |
          # 核心修复：file:// 协议 + 绝对路径
          cat > subconverter/generate.ini << 'EOF'
          [clash]
          path=clash.yaml
          target=clash-meta
          url=file:///github/workspace/clean.txt  # GitHub Actions 固定工作目录
          EOF
          
          cd subconverter
          ./subconverter -g --artifact "clash"
          mv clash.yaml ../
          cd ..
          
          # 严格校验
          if [ ! -f clash.yaml ] || ! grep -q "proxies:" clash.yaml; then
            echo "❌ 转换失败"
            exit 1
          fi
          echo "✅ 转换成功，节点数: $(grep -c 'server:' clash.yaml || echo 'N/A')"

      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clash.yaml
          git commit -m "Update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push https://${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
