name: 自动转换Clash订阅（清洗+转换 双保险）
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch raw nodes file
        run: curl -L "https://raw.githubusercontent.com/bin1site1/V2rayFree/main/config.txt" -o raw.txt

      - name: Clean invalid content (keep only valid nodes)
        run: |
          grep -E '^(vmess|vless|ss)://' raw.txt > clean.txt
          echo "✅ Cleaned nodes count: $(wc -l < clean.txt)"

      - name: Install subconverter
        run: |
          wget -q https://github.com/tindy2013/subconverter/releases/download/v0.9.0/subconverter_linux64.tar.gz
          tar zxf subconverter_linux64.tar.gz

      - name: Convert to Clash Meta format
        run: |
          ./subconverter/subconverter --mode convert \
            --input clean.txt \
            --output clash.yaml \
            --target clash-meta \
            --dedup true

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add clash.yaml
          git commit -m "Auto update subscription: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push origin main
