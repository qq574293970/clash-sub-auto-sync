name: Auto Convert Clash Subscription
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 拉取源文件
      - name: Download Raw Nodes
        run: curl -L "https://raw.githubusercontent.com/bin1site1/V2rayFree/main/config.txt" -o raw.txt

      # 🎯 核心修复：提取任意位置的节点链接（适配这个源文件）
      - name: Clean Nodes (Custom for This File)
        run: |
          # 提取所有包含 vmess/vless/ss 的行 → 提取纯链接 → 去重
          grep -E '(vmess|vless|ss)://' raw.txt | \
          grep -oE '(vmess|vless|ss)://[^ ]+' | \
          sort | uniq > clean.txt
          # 打印节点数量
          echo "✅ Valid Nodes: $(wc -l < clean.txt)"

      # 下载转换工具
      - name: Install Subconverter
        run: |
          wget -q https://github.com/tindy2013/subconverter/releases/download/v0.9.0/subconverter_linux64.tar.gz
          tar zxf subconverter_linux64.tar.gz

      # 转换（绝对不卡死）
      - name: Convert to Clash Meta
        run: |
          timeout 30 ./subconverter/subconverter \
          --input clean.txt \
          --output clash.yaml \
          --target clash-meta

      # 上传结果
      - name: Push Update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add clash.yaml
          git commit -m "Update: $(date)" || exit 0
          git push
