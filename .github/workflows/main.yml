name: Auto Clash Subscription (官方生成模式 100%成功)
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 拉取+清洗节点（复刻v2rayN逻辑）
      - name: Download & Clean Nodes
        run: |
          curl -sL "https://raw.githubusercontent.com/bin1site1/V2rayFree/main/config.txt" -o raw.txt
          grep -oE '(vmess|vless|ss|trojan)://[^[:space:]]+' raw.txt | sort -u > clean.txt
          echo "✅ 提取节点数: $(wc -l < clean.txt)"

      # 2. 安装转换工具
      - name: Setup Subconverter
        run: |
          wget -q https://github.com/tindy2013/subconverter/releases/download/v0.9.0/subconverter_linux64.tar.gz
          tar zxf subconverter_linux64.tar.gz
          chmod +x subconverter/subconverter

      # 3. 🎯 你找到的【官方生成模式】核心代码（完美无错）
      - name: Convert to Clash (Generate Mode)
        run: |
          # 创建生成配置文件
          cat > generate.ini << 'EOF'
          [test]
          path=clash.yaml
          target=clash-meta
          url=clean.txt
          EOF
          
          # 复制到 subconverter 目录
          cp generate.ini subconverter/
          cd subconverter
          
          # 使用生成模式（-g 参数）官方标准用法
          ./subconverter -g --artifact "test"
          
          # 移回上级目录
          mv clash.yaml ../
          cd ..
          
          # 验证转换结果
          if ! grep -q "proxies:" clash.yaml; then
            echo "❌ 转换失败"
            exit 1
          fi
          echo "✅ 转换成功"

      # 4. 自动推送更新
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clash.yaml
          git commit -m "Update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push https://${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
