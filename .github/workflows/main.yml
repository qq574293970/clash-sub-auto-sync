name: 清洗V2ray订阅并转Clash Meta
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 安装依赖（已修正权限问题）
      - name: 安装工具
        run: |
          sudo apt update -y
          sudo apt install -y jq sed curl
          go install github.com/bestnite/sub2clash@latest

      # 2. 下载并Base64解码（模拟V2RayN行为）
      - name: 下载并解码节点
        run: |
          curl -fsSL https://raw.githubusercontent.com/bin1site1/V2rayFree/main/config.txt -o raw.txt
          base64 -d raw.txt > nodes_raw.txt

      # 3. 清洗：去重 + 清理空行
      - name: 去重与格式化
        run: |
          sed -i '/^$/d' nodes_raw.txt
          awk '!seen[$0]++' nodes_raw.txt > nodes_clean.txt

      # 4. 生成 sub2clash 配置
      - name: 生成 sub2clash 配置
        run: |
          echo "
          subscriptions:
            - url: \"file://$(pwd)/nodes_clean.txt\"
          output:
            path: clash-meta.yaml
            format: meta
          rules:
            - MATCH,Proxy
          " > sub2clash.yaml

      # 5. 执行转换
      - name: 执行转换
        run: sub2clash -c sub2clash.yaml

      # 6. 提交到仓库
      - name: Commit & Push
        uses: EndBug/add-and-commit@v9
        with:
          message: Auto clean & update clash meta
          committer_name: Actions
          committer_email: actions@github.com
