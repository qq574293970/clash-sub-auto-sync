name: 自动同步Clash订阅（彻底修复卡死版）
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync-and-convert:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 拉取原仓库最新节点
        run: |
          curl -sL "https://raw.githubusercontent.com/bin1site1/V2rayFree/main/config.txt" -o raw-nodes.txt
          echo "✅ 节点拉取完成，预览："
          head -10 raw-nodes.txt

      - name: 下载稳定版转换工具
        run: |
          wget -q https://github.com/tindy2013/subconverter/releases/download/v0.9.0/subconverter_linux64.tar.gz
          tar -zxf subconverter_linux64.tar.gz

      - name: 【核心修复】一次性转换为Clash Meta格式
        run: |
          # 官方标准转换命令，--mode convert 强制一次性转换，绝不启动Web服务
          ./subconverter/subconverter \
            --mode convert \
            --input "$(pwd)/raw-nodes.txt" \
            --output "$(pwd)/clash-sub.yaml" \
            --target clash-meta \
            --dedup true
          echo "✅ 转换完成，配置预览："
          head -20 clash-sub.yaml

      - name: 提交更新到仓库
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add clash-sub.yaml
          git commit -m "自动更新订阅: $(date +'%Y-%m-%d %H:%M')" || echo "无更新内容，跳过提交"
          git push origin main
