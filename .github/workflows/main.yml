name: V2Ray转Clash Meta (subconverter 官方标准)
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 安装 subconverter（行业标准工具）
      - name: 安装转换工具
        run: |
          wget -O subc.tar.gz https://github.com/tindy2013/subconverter/releases/latest/download/subconverter_linux64.tar.gz
          tar -zxvf subc.tar.gz
          chmod +x subconverter

      # 2. 直接转换！subconverter 自动解码Base64 + 去重 + 转Meta
      - name: 生成Clash Meta配置
        run: |
          ./subconverter & sleep 2
          curl -s "http://127.0.0.1:25500/sub?target=meta&url=https://raw.githubusercontent.com/bin1site1/V2rayFree/main/config.txt" -o clash-meta.yaml

      # 3. 自动提交到仓库
      - name: 保存更新
        uses: EndBug/add-and-commit@v9
        with:
          message: Auto update Clash Meta
          committer_name: GitHub Actions
          committer_email: actions@github.com
